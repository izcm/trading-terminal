  <!-- subtle frame
  <rect x="24" y="24" width="552" height="552" rx="48"
        stroke="#7c5cff" stroke-opacity="0.25" stroke-width="2" fill="none"/> -->

  <!-- core mark (slightly bigger) -->
  <rect x="230" y="230" width="140" height="140" fill="#7c5cff"/>
  <rect x="265" y="265" width="70" height="70" fill="#0b0b10"/>

  <!-- label -->
  <text
    x="300"
    y="505"
    text-anchor="middle"
    fill="#7c5cff"
    font-family="monospace"
    font-size="34"
    letter-spacing="2"
  >
