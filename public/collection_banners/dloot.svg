<svg width="600" height="600" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">

  <rect width="600" height="600" rx="64" fill="#0b0b10"/>

  <!-- Shield -->
  <rect
    x="210"
    y="140"
    width="180"
    height="200"
    fill="#111827"
    stroke="#8b5cf6"
    stroke-width="10"/>

  <polygon
    points="210,340 390,340 300,445"
    fill="#111827"
    stroke="#8b5cf6"
    stroke-width="10"/>

  <!-- Potion -->
  <g transform="translate(300 315) scale(0.58)">

    <!-- Cork -->
    <rect x="-30" y="-150" width="60" height="30" fill="#a16207"/>

    <!-- Neck -->
    <rect x="-20" y="-120" width="40" height="60" fill="#9ca3af"/>

    <!-- Bottle -->
    <rect
      x="-80"
      y="-60"
      width="160"
      height="180"
      fill="#111827"/>

    <!-- Liquid -->
    <rect
      x="-60"
      y="-5"
      width="120"
      height="65"
      fill="#8b5cf6"/>

    <!-- Highlight -->
    <rect
      x="-42"
      y="-40"
      width="18"
      height="95"
      fill="#ffffff"
      opacity="0.18"/>

  </g>

  <!-- Sword -->
  <rect
    x="290"
    y="75"
    width="20"
    height="280"
    fill="#d1d5db"/>

  <!-- Crossguard -->
  <rect
    x="240"
    y="245"
    width="120"
    height="20"
    fill="#8b5cf6"/>

  <!-- Handle -->
  <rect
    x="295"
    y="265"
    width="10"
    height="110"
    fill="#78350f"/>

  <!-- Pommel -->
  <rect
    x="285"
    y="375"
    width="30"
    height="30"
    fill="#8b5cf6"/>

  <!-- Logo -->
  <text
    x="300"
    y="535"
    text-anchor="middle"
    fill="white"
    font-family="monospace"
    font-size="46"
    font-weight="700"
    letter-spacing="3">
    d | mrkt
  </text>

</svg>